
[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; ---------------------------------------------------------------------------
; Serial monitor
; ---------------------------------------------------------------------------
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time

; ---------------------------------------------------------------------------
; Upload
; ---------------------------------------------------------------------------
upload_speed = 921600
; upload_port = COM5          ; uncomment and set if auto-detect fails
; monitor_port = COM5

; ---------------------------------------------------------------------------
; Partition table with OTA support (two OTA app slots + OTA data),
; required for esp_ota_* rollback APIs used in this project.
; default.csv already includes ota_0 / ota_1 / otadata on most S3 boards,
; but it's set explicitly here to be safe.
; ---------------------------------------------------------------------------
board_build.partitions = default.csv
board_build.filesystem = littlefs

; ---------------------------------------------------------------------------
; USB / CDC settings — ESP32-S3 has native USB.
; Enable CDC-on-boot so Serial works over the native USB port without
; needing an external USB-UART bridge.
; ---------------------------------------------------------------------------
board_build.usb_mode = hw_cdc
build_flags =
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D ARDUINO_USB_MODE=1
    -D CORE_DEBUG_LEVEL=3

; ---------------------------------------------------------------------------
; Libraries
; ArduinoOTA, WiFi, HTTPClient, HTTPUpdate, Preferences, esp_ota_ops
; are all part of the ESP32 Arduino core, so no extra lib_deps are
; strictly required. Left here as a placeholder if you add libraries later.
; ---------------------------------------------------------------------------
lib_deps =

; ---------------------------------------------------------------------------
; Optional: bump this and use it as -D BUILD_VERSION="1.0.0" if you want
; to inject FIRMWARE_VERSION from platformio.ini instead of the .cpp file.
; ---------------------------------------------------------------------------
; build_flags =
;     -D FIRMWARE_VERSION=\"1.0.0\"
